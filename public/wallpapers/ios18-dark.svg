<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Base deep navy/black with subtle vertical tone -->
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#050614"/>
      <stop offset="0.35" stop-color="#030512"/>
      <stop offset="0.7"  stop-color="#04040E"/>
      <stop offset="1"    stop-color="#030410"/>
    </linearGradient>

    <!-- Flowing band gradients: each band is a wide, curved shape filled with a
         radial gradient that fades to transparent. Stacked and blurred heavily
         to emulate Apple's "iOS 18 Sonoma" style wallpaper. -->
    <radialGradient id="cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0"   stop-color="#3BC8FF" stop-opacity="1"/>
      <stop offset="0.3" stop-color="#1A86E0" stop-opacity="0.85"/>
      <stop offset="0.7" stop-color="#0A3B8C" stop-opacity="0.35"/>
      <stop offset="1"   stop-color="#02061C" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="violet" cx="50%" cy="50%" r="50%">
      <stop offset="0"   stop-color="#C85BFF" stop-opacity="1"/>
      <stop offset="0.3" stop-color="#8A1FE6" stop-opacity="0.80"/>
      <stop offset="0.7" stop-color="#3A0A8C" stop-opacity="0.30"/>
      <stop offset="1"   stop-color="#0A0220" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="magenta" cx="50%" cy="50%" r="50%">
      <stop offset="0"   stop-color="#FF4FC1" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#B21577" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#18040F" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="indigo" cx="50%" cy="50%" r="50%">
      <stop offset="0"   stop-color="#5A28FF" stop-opacity="0.90"/>
      <stop offset="0.4" stop-color="#2A0DBA" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#040216" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="teal" cx="50%" cy="50%" r="50%">
      <stop offset="0"   stop-color="#2AD4D4" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#0E7CA8" stop-opacity="0.45"/>
      <stop offset="1"   stop-color="#02101C" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="lilac" cx="50%" cy="50%" r="50%">
      <stop offset="0"   stop-color="#B08BFF" stop-opacity="0.80"/>
      <stop offset="0.5" stop-color="#5C2FBF" stop-opacity="0.40"/>
      <stop offset="1"   stop-color="#050214" stop-opacity="0"/>
    </radialGradient>

    <!-- Gentle grain for OLED-like texture -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.04
                             0 0 0 0 0.04
                             0 0 0 0 0.06
                             0 0 0 0.05 0"/>
    </filter>

    <!-- Heavy blur used on bloom shapes -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <filter id="softer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="58"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="390" height="844" fill="url(#base)"/>

  <!-- Bloom layer (strongly blurred) -->
  <g filter="url(#soft)">
    <!-- Big cyan bloom upper-left (the signature iOS 18 cold-bright glow) -->
    <ellipse cx="95"  cy="180" rx="220" ry="170" fill="url(#cyan)"/>
    <!-- Violet bloom upper-right -->
    <ellipse cx="330" cy="110" rx="210" ry="170" fill="url(#violet)"/>
    <!-- Magenta-pink small accent mid-right -->
    <ellipse cx="380" cy="370" rx="150" ry="120" fill="url(#magenta)"/>
    <!-- Indigo bloom center-right -->
    <ellipse cx="305" cy="510" rx="230" ry="200" fill="url(#indigo)"/>
    <!-- Teal bloom lower-left -->
    <ellipse cx="40"  cy="680" rx="210" ry="180" fill="url(#teal)"/>
    <!-- Lilac bloom bottom-center -->
    <ellipse cx="210" cy="790" rx="260" ry="170" fill="url(#lilac)"/>
  </g>

  <!-- Softer, wider atmospheric haze (super-blurred) on top for cohesion -->
  <g filter="url(#softer)" opacity="0.55">
    <ellipse cx="200" cy="460" rx="320" ry="260" fill="url(#indigo)"/>
    <ellipse cx="340" cy="250" rx="180" ry="160" fill="url(#violet)"/>
    <ellipse cx="70"  cy="340" rx="160" ry="140" fill="url(#cyan)"/>
  </g>

  <!-- Top specular micro-highlight (where glass would catch ambient light) -->
  <ellipse cx="80" cy="40" rx="120" ry="50" fill="#ffffff" opacity="0.04" filter="url(#soft)"/>

  <!-- Bottom vignette for OLED depth -->
  <rect x="0" y="560" width="390" height="284"
        fill="url(#base)" opacity="0.55"/>
  <rect x="0" y="780" width="390" height="64"
        fill="#000" opacity="0.35"/>

  <!-- Grain / OLED dither on top (very subtle) -->
  <rect width="390" height="844" filter="url(#grain)" opacity="0.4"/>
</svg>
